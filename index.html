function saveOrder(order) {
  const orders = getOrders();
  const newOrder = {...order,id:`ST-ORD-${Date.now()}`,createdAt:new Date().toISOString(),status:'pending',statusHistory:[{status:'pending',date:new Date().toISOString(),note:'تم استلام الطلب'}]};
  orders.unshift(newOrder);
  localStorage.setItem('startorque_orders',JSON.stringify(orders));
  return newOrder;
}
function getOrders() { try{return JSON.parse(localStorage.getItem('startorque_orders')||'[]')}catch{return[]} }
function updateOrderStatus(id,status,note='') {
  const orders=getOrders();const idx=orders.findIndex(o=>o.id===id);
  if(idx===-1)return null;
  orders[idx].status=status;orders[idx].statusHistory=orders[idx].statusHistory||[];
  orders[idx].statusHistory.push({status,date:new Date().toISOString(),note});
  localStorage.setItem('startorque_orders',JSON.stringify(orders));return orders[idx];
}
function deleteOrder(id){localStorage.setItem('startorque_orders',JSON.stringify(getOrders().filter(o=>o.id!==id)))}

  function handleSubmit(){
    if(!form.name||!form.phone||!form.city)return showToast('يرجى تعبئة الحقول المطلوبة');
    const order=saveOrder({customer:form,items:cart.map(i=>({id:i.id,name:i.name,sku:i.sku,price:i.price,quantity:i.quantity})),total,paymentMethod:form.method,notes:form.notes});
    if(form.method==='whatsapp'){
      const msg=encodeURIComponent(`*طلب جديد #${order.id}*\nالعميل: ${form.name}\nالهاتف: ${form.phone}\nالإجمالي: ${total} ريال`);
      window.open(`https://wa.me/966500000000?text=${msg}`,'_blank');
    }
    setSubmitted(order);clearCart();
  }
  if(submitted)return(
    <div style={{padding:'80px 20px',textAlign:'center',maxWidth:500,margin:'0 auto'}}>
      <div style={{fontSize:64,marginBottom:20}}>🎉</div>
      <h2 style={{fontSize:24,fontWeight:800,color:'#22c55e',marginBottom:12}}>تم استلام طلبك!</h2>
      <p style={{color:'#888',marginBottom:8}}>رقم الطلب: <span style={{color:'#c8960c',fontWeight:700}}>{submitted.id}</span></p>
      <div style={{display:'flex',gap:12,justifyContent:'center',marginTop:24}}>
        <button className="btn-gold" onClick={()=>setPage('track')}>تتبع الطلب</button>
        <button className="btn-outline" onClick={()=>setPage('catalog')}>متابعة التسوق</button>
      </div>
    </div>
  );
  if(cart.length===0)return(
    <div style={{padding:'80px 20px',textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:20}}>🛒</div>
      <h2 style={{marginBottom:16}}>السلة فارغة</h2>
      <button className="btn-gold" onClick={()=>setPage('catalog')}>استعرض الكتالوج</button>
    </div>
  );
  return(
    <div style={{padding:'40px 0 80px'}}>
      <div className="container" style={{maxWidth:800}}>
        <h1 className="section-title" style={{marginBottom:32}}>سلة <span>التسوق</span></h1>
        {cart.map(item=>(
          <div key={item.id} className="card" style={{padding:16,display:'flex',gap:14,alignItems:'center',marginBottom:12}}>
            <img src={item.images?.[0]} alt={item.name} style={{width:70,height:70,borderRadius:8,objectFit:'cover'}} onError={e=>{e.target.src='https://via.placeholder.com/70/141414/c8960c?text=ST'}}/>
            <div style={{flex:1}}>
              <p style={{fontWeight:700,fontSize:14}}>{item.name}</p>
              <p style={{color:'#555',fontSize:12}}>SKU: {item.sku}</p>
            </div>
            <div style={{display:'flex',alignItems:'center',border:'1px solid #2a2a2a',borderRadius:8,overflow:'hidden'}}>
              <button onClick={()=>updateQty(item.id,item.quantity-1)} style={{background:'#141414',border:'none',color:'#e8e8e8',width:30,height:34,cursor:'pointer'}}>-</button>
              <span style={{width:34,textAlign:'center',fontWeight:700}}>{item.quantity}</span>
              <button onClick={()=>updateQty(item.id,item.quantity+1)} style={{background:'#141414',border:'none',color:'#e8e8e8',width:30,height:34,cursor:'pointer'}}>+</button>
            </div>
            <span style={{color:'#c8960c',fontWeight:800,minWidth:70,textAlign:'left'}}>{item.price*item.quantity} ريال</span>
            <button onClick={()=>removeFromCart(item.id)} style={{background:'none',border:'none',color:'#555',cursor:'pointer',fontSize:18}}>✕</button>
          </div>
        ))}
        <div style={{background:'#0d0d0d',border:'1px solid #1a1a1a',borderRadius:14,padding:20,marginBottom:20,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:18,fontWeight:700}}>الإجمالي</span>
          <span style={{fontSize:28,fontWeight:900,color:'#c8960c'}}>{total} <span style={{fontSize:14,color:'#666'}}>ريال</span></span>
        </div>
        <button className="btn-gold" style={{width:'100%',padding:'15px',fontSize:16}} onClick={()=>setShowCheckout(true)}>المتابعة للطلب</button>
        {showCheckout&&(
          <div className="overlay" onClick={e=>e.target===e.currentTarget&&setShowCheckout(false)}>
            <div className="modal">
              <h2 style={{fontWeight:800,fontSize:20,marginBottom:20}}>إتمام الطلب</h2>
              <div className="form-group"><label>الاسم *</label><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="محمد أحمد"/></div>
              <div className="form-group"><label>الهاتف *</label><input value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="05XXXXXXXX"/></div>
              <div className="form-group"><label>المدينة *</label><input value={form.city} onChange={e=>setForm({...form,city:e.target.value})} placeholder="الرياض"/></div>
              <div className="form-group"><label>العنوان</label><textarea rows={2} value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/></div>
              <div className="form-group"><label>طريقة التواصل</label><select value={form.method} onChange={e=>setForm({...form,method:e.target.value})}><option value="whatsapp">واتساب</option><option value="email">إيميل</option></select></div>
              <div className="form-group"><label>ملاحظات</label><textarea rows={2} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/></div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn-gold" style={{flex:1,padding:'12px'}} onClick={handleSubmit}>تأكيد الطلب</button>
                <button className="btn-outline" onClick={()=>setShowCheckout(false)}>إلغاء</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Track(){
  const [q,setQ]=useState('');const [result,setResult]=useState(null);const [searched,setSearched]=useState(false);
  function search(){const orders=getOrders();setResult(orders.find(o=>o.id===q.trim()||o.customer?.phone===q.trim())||null);setSearched(true);}
  return(
    <div style={{padding:'60px 0 100px'}}>
      <div className="container" style={{maxWidth:600}}>
        <h1 className="section-title" style={{marginBottom:8}}>تتبع <span>الطلب</span></h1>
        <p className="section-sub">أدخل رقم الطلب أو رقم الهاتف</p>
        <div style={{display:'flex',gap:10,marginBottom:32}}>
          <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()} placeholder="ST-ORD-..." style={{flex:1,background:'#141414',border:'1px solid #2a2a2a',color:'#e8e8e8',padding:'12px 16px',borderRadius:10,fontSize:14,fontFamily:'inherit'}}/>
          <button className="btn-gold" onClick={search}>بحث</button>
        </div>
        {searched&&!result&&<div style={{textAlign:'center',padding:'40px',color:'#555'}}><div style={{fontSize:40,marginBottom:12}}>🔍</div><p>لم يعثر على طلب</p></div>}
        {result&&(
          <div className="card" style={{padding:24}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
              <div><p style={{color:'#555',fontSize:12}}>رقم الطلب</p><p style={{fontWeight:800,color:'#c8960c'}}>{result.id}</p></div>
              <span style={{background:ORDER_STATUSES[result.status]?.color+'22',color:ORDER_STATUSES[result.status]?.color,padding:'5px 12px',borderRadius:20,fontWeight:700,fontSize:13}}>{ORDER_STATUSES[result.status]?.label}</span>
            </div>
            {result.items?.map(item=>(
              <div key={item.id} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid #1a1a1a',fontSize:13}}>
                <span style={{color:'#aaa'}}>{item.name} × {item.quantity}</span>
                <span style={{color:'#c8960c',fontWeight:700}}>{item.price*item.quantity} ريال</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',paddingTop:12,fontWeight:800}}>
              <span>الإجمالي</span><span style={{color:'#c8960c'}}>{result.total} ريال</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function Admin(){
  const [authed,setAuthed]=useState(false);const [pw,setPw]=useState('');const [orders,setOrders]=useState([]);const [tab,setTab]=useState('orders');const [sel,setSel]=useState(null);const [newStatus,setNewStatus]=useState('');const [note,setNote]=useState('');
  useEffect(()=>{if(authed)setOrders(getOrders())},[authed]);
  if(!authed)return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'80vh',padding:20}}>
      <div className="modal" style={{maxWidth:360}}>
        <div style={{textAlign:'center',marginBottom:24}}>
          <div style={{width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,#c8960c,#f0d060)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:18,color:'#080808',margin:'0 auto 14px'}}>ST</div>
          <h2 style={{fontWeight:800,fontSize:20}}>لوحة الإدارة</h2>
        </div>
        <div className="form-group"><label>كلمة المرور</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(pw==='ST@admin2025'?setAuthed(true):alert('خطأ'))}/></div>
        <button className="btn-gold" style={{width:'100%',padding:'12px'}} onClick={()=>pw==='ST@admin2025'?setAuthed(true):alert('كلمة مرور خاطئة')}>دخول</button>
      </div>
    </div>
  );
  return(
    <div style={{padding:'32px 0 80px'}}>
      <div className="container">
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:32}}>
          <h1 className="section-title">لوحة <span>الإدارة</span></h1>
          <button className="btn-outline" onClick={()=>setAuthed(false)}>خروج</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:14,marginBottom:28}}>
          {[['الطلبات',orders.length,'#c8960c','📦'],['في الانتظار',orders.filter(o=>o.status==='pending').length,'#f59e0b','⏳'],['موصّل',orders.filter(o=>o.status==='delivered').length,'#22c55e','✅'],['الإيرادات',orders.filter(o=>o.status!=='cancelled').reduce((s,o)=>s+o.total,0)+' ر','#3b82f6','💰']].map(([l,v,c,i])=>(
            <div key={l} className="card" style={{padding:18}}>
              <div style={{fontSize:22,marginBottom:6}}>{i}</div>
              <div style={{fontSize:24,fontWeight:900,color:c}}>{v}</div>
              <div style={{fontSize:12,color:'#555'}}>{l}</div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:8,marginBottom:20,borderBottom:'1px solid #1a1a1a'}}>
          {[['orders','الطلبات'],['products','المنتجات'],['suppliers','الموردون']].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{background:'none',border:'none',color:tab===id?'#c8960c':'#555',fontSize:14,fontWeight:700,padding:'10px 16px',cursor:'pointer',borderBottom:tab===id?'2px solid #c8960c':'2px solid transparent'}}>{label}</button>
          ))}
        </div>
        {tab==='orders'&&(orders.length===0?<div style={{textAlign:'center',padding:'60px',color:'#444'}}>لا توجد طلبات بعد</div>:orders.map(order=>(
          <div key={order.id} className="card" style={{padding:18,marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
              <div><p style={{fontWeight:800,color:'#c8960c'}}>{order.id}</p><p style={{color:'#aaa',fontSize:13,marginTop:3}}>{order.customer?.name} — {order.customer?.phone}</p></div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                <span style={{background:ORDER_STATUSES[order.status]?.color+'22',color:ORDER_STATUSES[order.status]?.color,padding:'4px 10px',borderRadius:20,fontWeight:700,fontSize:12}}>{ORDER_STATUSES[order.status]?.label}</span>
                <span style={{color:'#c8960c',fontWeight:800}}>{order.total} ريال</span>
                <button onClick={()=>setSel(order)} style={{background:'rgba(200,150,12,0.1)',border:'1px solid #c8960c55',color:'#c8960c',padding:'4px 10px',borderRadius:8,cursor:'pointer',fontSize:12}}>تعديل</button>
                <button onClick={()=>{if(window.confirm('حذف؟')){deleteOrder(order.id);setOrders(getOrders())}}} style={{background:'rgba(239,68,68,0.1)',border:'1px solid #ef444444',color:'#ef4444',padding:'4px 10px',borderRadius:8,cursor:'pointer',fontSize:12}}>حذف</button>
              </div>
            </div>
          </div>
        )))}
        {tab==='products'&&products.map(p=>(
          <div key={p.id} className="card" style={{padding:14,display:'flex',gap:12,alignItems:'center',marginBottom:10}}>
            <img src={p.images[0]} alt={p.name} style={{width:56,height:56,borderRadius:8,objectFit:'cover'}} onError={e=>{e.target.src='https://via.placeholder.com/56/141414/c8960c?text=ST'}}/>
            <div style={{flex:1}}><p style={{fontWeight:700,fontSize:14}}>{p.name}</p><p style={{color:'#555',fontSize:12}}>SKU: {p.sku}</p></div>
            <p style={{color:'#c8960c',fontWeight:800}}>{p.price} ريال</p>
            <span style={{color:p.inStock?'#22c55e':'#ef4444',fontSize:12}}>{p.inStock?'✓':'✗'}</span>
          </div>
        ))}
        {tab==='suppliers'&&products.map(p=>(
          <div key={p.id} className="card" style={{padding:14,marginBottom:10}}>
            <div style={{display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
              <div><p style={{fontWeight:700,fontSize:14}}>{p.name}</p><p style={{color:'#c8960c',fontSize:13}}>{p.supplier.platform}</p></div>
              <div><p style={{color:'#22c55e',fontWeight:700}}>تكلفة: {p.supplier.unitCost}$</p><a href={p.supplier.sourceUrl} target="_blank" style={{color:'#3b82f6',fontSize:12}}>رابط المصدر ↗</a></div>
            </div>
          </div>
        ))}
        {sel&&(
          <div className="overlay" onClick={e=>e.target===e.currentTarget&&setSel(null)}>
            <div className="modal">
              <h3 style={{fontWeight:800,marginBottom:20}}>تحديث الطلب {sel.id}</h3>
              <div className="form-group"><label>الحالة</label><select value={newStatus} onChange={e=>setNewStatus(e.target.value)}><option value="">اختر</option>{Object.entries(ORDER_STATUSES).map(([k,s])=><option key={k} value={k}>{s.label}</option>)}</select></div>
              <div className="form-group"><label>ملاحظة</label><input value={note} onChange={e=>setNote(e.target.value)}/></div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn-gold" style={{flex:1}} onClick={()=>{if(newStatus){updateOrderStatus(sel.id,newStatus,note);setOrders(getOrders());setSel(null);setNewStatus('');setNote('')}}}>حفظ</button>
                <button className="btn-outline" onClick={()=>setSel(null)}>إلغاء</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [page,setPage]=useState('home');
  const [currentProduct,setCurrentProduct]=useState(null);
  const [cart,setCart]=useState([]);
  const [toast,setToast]=useState(null);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),3000)}
  function addToCart(product,qty=1){
    setCart(prev=>{const ex=prev.find(i=>i.id===product.id);if(ex)return prev.map(i=>i.id===product.id?{...i,quantity:i.quantity+qty}:i);return[...prev,{...product,quantity:qty}]});
    showToast(`تمت إضافة "${product.name}" للسلة`);
  }
  function removeFromCart(id){setCart(prev=>prev.filter(i=>i.id!==id))}
  function updateQty(id,qty){if(qty<1)return removeFromCart(id);setCart(prev=>prev.map(i=>i.id===id?{...i,quantity:qty}:i))}
  function clearCart(){setCart([])}
  const total=cart.reduce((s,i)=>s+i.price*i.quantity,0);
  const count=cart.reduce((s,i)=>s+i.quantity,0);

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Navbar page={page} setPage={setPage} count={count}/>
      <main style={{flex:1}}>
        {page==='home'&&<Home setPage={setPage} setCurrentProduct={setCurrentProduct} addToCart={addToCart}/>}
        {page==='catalog'&&<Catalog setPage={setPage} setCurrentProduct={setCurrentProduct} addToCart={addToCart}/>}
        {page==='product'&&<ProductDetail product={currentProduct} setPage={setPage} addToCart={addToCart}/>}
        {page==='cart'&&<Cart cart={cart} removeFromCart={removeFromCart} updateQty={updateQty} clearCart={clearCart} total={total} setPage={setPage} showToast={showToast}/>}
        {page==='track'&&<Track/>}
        {page==='admin'&&<Admin/>}
      </main>
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
